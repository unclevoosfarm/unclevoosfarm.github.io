backend:
  name: github
  repo: unclevoosfarm/unclevoosfarm.github.io
  branch: main
  base_url: https://uncle-voos-farm-cms-auth.uvf-cms.workers.dev
  auth_endpoint: /

media_folder: public/uploads
public_folder: /uploads

collections:
  # ── Site Settings ──────────────────────────────────────────────────
  - name: settings
    label: Site Settings
    files:
      - name: general
        label: General Settings
        file: src/content/settings.json
        fields:
          - name: siteName
            label: Site Name
            widget: object
            fields:
              - { name: en, label: "English", widget: string }
              - { name: my, label: "Malay (BM)", widget: string }
              - { name: zh, label: "Chinese (中文)", widget: string }
          - name: tagline
            label: Tagline
            widget: object
            fields:
              - { name: en, label: "English", widget: string }
              - { name: my, label: "Malay (BM)", widget: string }
              - { name: zh, label: "Chinese (中文)", widget: string }
          - { name: bookingWhatsApp, label: Booking WhatsApp URL, widget: string }
          - { name: shopWhatsApp, label: Shop WhatsApp URL, widget: string }
          - { name: tourWhatsApp, label: Tour WhatsApp URL, widget: string }
          - { name: shopEmail, label: Shop Email, widget: string }
          - name: footerCopyright
            label: Footer Copyright Text
            widget: object
            fields:
              - { name: en, label: "English", widget: string }
              - { name: my, label: "Malay (BM)", widget: string }
              - { name: zh, label: "Chinese (中文)", widget: string }

  # ── Hero Slides ────────────────────────────────────────────────────
  - name: hero
    label: Hero
    files:
      - name: slides
        label: Hero Slides
        file: src/content/hero.json
        fields:
          - name: slides
            label: Slides
            widget: list
            fields:
              - { name: id, label: ID, widget: string }
              - name: badge
                label: Badge Label
                widget: object
                fields:
                  - { name: en, label: "English", widget: string }
                  - { name: my, label: "Malay (BM)", widget: string }
                  - { name: zh, label: "Chinese (中文)", widget: string }
              - name: badgeIcon
                label: Badge Icon
                widget: select
                options:
                  - { label: Home, value: home }
                  - { label: Store, value: store }
                  - { label: Compass, value: compass }
              - name: headingLine1
                label: Heading Line 1
                widget: object
                fields:
                  - { name: en, label: "English", widget: string }
                  - { name: my, label: "Malay (BM)", widget: string }
                  - { name: zh, label: "Chinese (中文)", widget: string }
              - name: headingAccent
                label: Heading Accent Word
                widget: object
                fields:
                  - { name: en, label: "English", widget: string }
                  - { name: my, label: "Malay (BM)", widget: string }
                  - { name: zh, label: "Chinese (中文)", widget: string }
              - name: description
                label: Description
                widget: object
                fields:
                  - { name: en, label: "English", widget: text }
                  - { name: my, label: "Malay (BM)", widget: text }
                  - { name: zh, label: "Chinese (中文)", widget: text }
              - name: ctaLabel
                label: CTA Button Label
                widget: object
                fields:
                  - { name: en, label: "English", widget: string }
                  - { name: my, label: "Malay (BM)", widget: string }
                  - { name: zh, label: "Chinese (中文)", widget: string }
              - { name: ctaHref, label: CTA Link, widget: string }
              - { name: image, label: Image URL, widget: image }
              - { name: imageAlt, label: Image Alt Text, widget: string }

  # ── Stay ───────────────────────────────────────────────────────────
  - name: stay
    label: Farm Stay
    files:
      - name: stays_list
        label: Stay Listings
        file: src/content/stay.json
        fields:
          - name: stays
            label: Stays
            widget: list
            fields:
              - { name: id, label: ID (slug), widget: string }
              - name: name
                label: Property Name
                widget: object
                fields:
                  - { name: en, label: "English", widget: string }
                  - { name: my, label: "Malay (BM)", widget: string }
                  - { name: zh, label: "Chinese (中文)", widget: string }
              - { name: price, label: Price, widget: string }
              - name: priceUnit
                label: Price Unit
                widget: object
                fields:
                  - { name: en, label: "English", widget: string }
                  - { name: my, label: "Malay (BM)", widget: string }
                  - { name: zh, label: "Chinese (中文)", widget: string }
              - name: description
                label: Description
                widget: object
                fields:
                  - { name: en, label: "English", widget: text }
                  - { name: my, label: "Malay (BM)", widget: text }
                  - { name: zh, label: "Chinese (中文)", widget: text }
              - { name: image, label: Main Image URL, widget: image }
              - name: gallery
                label: Gallery Images
                widget: list
                field: { name: url, label: Image URL, widget: image }
              - { name: whatsappLink, label: WhatsApp Booking URL, widget: string }
              - name: amenities
                label: Amenities
                widget: list
                fields:
                  - { name: en, label: "English", widget: string }
                  - { name: my, label: "Malay (BM)", widget: string }
                  - { name: zh, label: "Chinese (中文)", widget: string }

  # ── Products ───────────────────────────────────────────────────────
  - name: products
    label: Harvest Products
    files:
      - name: product_list
        label: Products List
        file: src/content/products.json
        fields:
          - name: products
            label: Products
            widget: list
            fields:
              - { name: id, label: ID (slug), widget: string }
              - name: name
                label: Name
                widget: object
                fields:
                  - { name: en, label: "English", widget: string }
                  - { name: my, label: "Malay (BM)", widget: string }
                  - { name: zh, label: "Chinese (中文)", widget: string }
              - { name: price, label: Price, widget: string, required: false, hint: "Leave blank if price not yet set" }
              - { name: unit, label: Unit (e.g. /kg), widget: string, required: false }
              - name: description
                label: Description
                widget: object
                fields:
                  - { name: en, label: "English", widget: text }
                  - { name: my, label: "Malay (BM)", widget: text }
                  - { name: zh, label: "Chinese (中文)", widget: text }
              - { name: image, label: Image URL, widget: image }
              - { name: bgColor, label: Card Background Colour (hex), widget: string }
              - name: category
                label: Category
                widget: object
                fields:
                  - { name: en, label: "English (used as filter key)", widget: string }
                  - { name: my, label: "Malay (BM)", widget: string }
                  - { name: zh, label: "Chinese (中文)", widget: string }
              - { name: badge, label: Badge Text (optional), widget: string, required: false }
              - name: badgeType
                label: Badge Type
                widget: select
                required: false
                options:
                  - { label: In Season, value: season }
                  - { label: Best Seller, value: best }
                  - { label: None, value: '' }

  # ── Farm Tours ─────────────────────────────────────────────────────
  - name: tours
    label: Farm Tours
    files:
      - name: tour_list
        label: Tours List
        file: src/content/tours.json
        fields:
          - name: tours
            label: Tours
            widget: list
            fields:
              - { name: id, label: ID (slug), widget: string }
              - name: title
                label: Title
                widget: object
                fields:
                  - { name: en, label: "English", widget: string }
                  - { name: my, label: "Malay (BM)", widget: string }
                  - { name: zh, label: "Chinese (中文)", widget: string }
              - { name: price, label: "Price (leave blank to hide)", widget: string, required: false }
              - name: duration
                label: Duration
                widget: object
                fields:
                  - { name: en, label: "English", widget: string }
                  - { name: my, label: "Malay (BM)", widget: string }
                  - { name: zh, label: "Chinese (中文)", widget: string }
              - name: description
                label: Description
                widget: object
                fields:
                  - { name: en, label: "English", widget: text }
                  - { name: my, label: "Malay (BM)", widget: text }
                  - { name: zh, label: "Chinese (中文)", widget: text }
              - name: features
                label: Feature Highlights (3 items)
                widget: list
                fields:
                  - { name: en, label: "English", widget: string }
                  - { name: my, label: "Malay (BM)", widget: string }
                  - { name: zh, label: "Chinese (中文)", widget: string }
              - { name: image, label: Image URL, widget: image }
              - { name: badge, label: Badge (e.g. Most Popular), widget: string, required: false }

  # ── Testimonials ───────────────────────────────────────────────────
  - name: testimonials
    label: Testimonials
    files:
      - name: reviews
        label: Guest Reviews
        file: src/content/testimonials.json
        fields:
          - { name: rating, label: Overall Rating, widget: string }
          - { name: reviewCount, label: Review Count Label, widget: string }
          - name: testimonials
            label: Testimonials
            widget: list
            fields:
              - { name: id, label: ID (slug), widget: string }
              - name: text
                label: Review Text
                widget: object
                fields:
                  - { name: en, label: "English", widget: text }
                  - { name: my, label: "Malay (BM)", widget: text }
                  - { name: zh, label: "Chinese (中文)", widget: text }
              - { name: name, label: Reviewer Name, widget: string }
              - name: role
                label: Reviewer Role / Trip Type
                widget: object
                fields:
                  - { name: en, label: "English", widget: string }
                  - { name: my, label: "Malay (BM)", widget: string }
                  - { name: zh, label: "Chinese (中文)", widget: string }

  # ── Contact ────────────────────────────────────────────────────────
  - name: contact
    label: Contact Info
    files:
      - name: contact_details
        label: Contact Details
        file: src/content/contact.json
        fields:
          - name: address
            label: Address
            widget: object
            fields:
              - { name: en, label: "English", widget: text }
              - { name: my, label: "Malay (BM)", widget: text }
              - { name: zh, label: "Chinese (中文)", widget: text }
          - { name: phone, label: Phone Number, widget: string }
          - { name: email, label: Email Address, widget: string }
          - { name: whatsappNumber, label: WhatsApp Number (digits only), widget: string }
          - { name: mapEmbedUrl, label: Google Maps Embed URL, widget: string }
          - { name: facebook, label: Facebook URL, widget: string, required: false }
          - { name: instagram, label: Instagram URL, widget: string, required: false }
          - { name: twitter, label: Twitter / X URL, widget: string, required: false }
          - name: formspreeEndpoint
            label: "Contact Form Endpoint (Formspree)"
            widget: string
            required: false
            hint: "Create a free form at formspree.io and paste the endpoint URL here (e.g. https://formspree.io/f/xxxxx)"
